name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build

      - name: go vet
        run: go vet ./...

      - name: Build binaries
        run: go build ./...

      # Runs on every OS so platform-specific paths (notably the Windows
      # credstore machine-seed) are actually exercised, not just cross-compiled.
      - name: Test
        run: go test ./... -count=1

  race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build
      - name: Test (race)
        run: go test -race ./... -count=1
