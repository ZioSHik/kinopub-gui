name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # macOS GUI is built on a real Mac so CGO is on and the menu-bar (systray)
  # shell is compiled in. Produces the .dmg installers and the bare darwin GUI
  # binaries the in-app updater downloads (extracted from the bundles so the
  # updated binary keeps the menu-bar shell).
  macos:
    name: macOS (.dmg + updater binaries)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Build web UI
        run: cd web && npm ci && npm run build

      - name: Build .app, .dmg and updater binaries (arm64 + amd64)
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p out
          ARCH=arm64  ./scripts/package-macos.sh
          cp dist-app/KinoPub.app/Contents/MacOS/kinopub-gui out/kinopub-gui-darwin-arm64
          ARCH=x86_64 ./scripts/package-macos.sh
          cp dist-app/KinoPub.app/Contents/MacOS/kinopub-gui out/kinopub-gui-darwin-amd64
          cp dist-app/*.dmg out/
          ls -la out

      - uses: actions/upload-artifact@v5
        with:
          name: macos
          path: out/*
          if-no-files-found: error

  # Everything cross-compilable on Linux: the GUI for Windows (no-console + icon +
  # tray; systray is pure-Go on Windows), Linux and Android. The Linux amd64 GUI
  # links GTK/appindicator for its tray (CGO on).
  linux-windows:
    name: Linux, Windows & Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Linux tray build deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Build web UI
        run: cd web && npm ci && npm run build

      - name: Build GUI binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p out
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # ---- GUI: Windows (no console + embedded icon; systray is pure-Go here) ----
          go run github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest \
            -skip-versioninfo -icon build/icons/icon.ico -64 \
            -o cmd/kinopub-gui/resource_windows_amd64.syso
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="$LDFLAGS -H windowsgui" -trimpath -o out/kinopub-gui-windows-amd64.exe ./cmd/kinopub-gui
          rm -f cmd/kinopub-gui/resource_windows_amd64.syso

          # ---- GUI: Linux arm64 + Android (headless, static — no tray) ----
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="$LDFLAGS" -trimpath -o out/kinopub-gui-linux-arm64   ./cmd/kinopub-gui
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -ldflags="$LDFLAGS" -trimpath -o out/kinopub-gui-android-arm64 ./cmd/kinopub-gui

          # ---- GUI: Linux amd64 (tray via GTK/appindicator — needs CGO) ----
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -trimpath -o out/kinopub-gui-linux-amd64 ./cmd/kinopub-gui

          ls -la out

      - name: Build Linux AppImage (amd64, tray)
        continue-on-error: true
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp out/kinopub-gui-linux-amd64 "$APPDIR/usr/bin/kinopub-gui"
          chmod +x "$APPDIR/usr/bin/kinopub-gui"
          cp build/icons/icon-256.png "$APPDIR/kinopub-gui.png"
          printf '%s\n' '[Desktop Entry]' 'Type=Application' 'Name=KinoPub Downloader' \
            'Exec=kinopub-gui' 'Icon=kinopub-gui' 'Categories=AudioVideo;Network;' 'Terminal=false' \
            > "$APPDIR/kinopub-gui.desktop"
          printf '%s\n' '#!/bin/sh' 'HERE="$(dirname "$(readlink -f "$0")")"' \
            'exec "$HERE/usr/bin/kinopub-gui" "$@"' > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$APPDIR" "out/KinoPub-${VERSION}-x86_64.AppImage"

      - uses: actions/upload-artifact@v5
        with:
          name: linux-windows
          path: out/*
          if-no-files-found: error

  # Gather both build jobs' artifacts, compute the checksums the in-app updater
  # verifies against, and publish the GitHub release.
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [macos, linux-windows]
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum kinopub-* > checksums.txt
          echo "--- checksums.txt ---"
          cat checksums.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
